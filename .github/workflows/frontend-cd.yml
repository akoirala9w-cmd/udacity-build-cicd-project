name: Frontend Continuous Deployment

on:
  push:
    branches:  
      - main
    paths:
      - 'starter/frontend/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: frontend
  REACT_APP_MOVIE_API_URL: http://localhost:5000
  AWS_EKS_CLUSTER_NAME: cluster

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Environment
        uses: ./.github/actions/setup-frontend
    
      - name: Run Linter
        run: npm run lint
  
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Environment
        uses: ./.github/actions/setup-frontend
      
      - name: Run Tests
        run: npm test

  build-and-deploy:
    name: Build and Deploy Application
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: starter/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Environment
        uses: ./.github/actions/setup-frontend

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with: 
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.AWS_EKS_CLUSTER_NAME }}

      # resolve backend URL
      - name: Resolve Backend API URL
        id: resolve-url
        run: |
          # Attempt to extract the LoadBalancer hostname. Suppress errors if the service doesn't exist yet.
          BACKEND_HOST=$(kubectl get svc backend -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          
          if [ -z "$BACKEND_HOST" ]; then
            echo "Backend LoadBalancer not found. Falling back to localhost."
            echo "DYNAMIC_API_URL=http://localhost:5000" >> $GITHUB_ENV
          else
            echo "Found live backend at $BACKEND_HOST"
            echo "DYNAMIC_API_URL=http://$BACKEND_HOST" >> $GITHUB_ENV
          fi
      
      - name: Build Application
        run: docker build --tag=mp-frontend:latest --build-arg=REACT_APP_MOVIE_API_URL=${{ env.DYNAMIC_API_URL }} .

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Tag and push existing image to Amazon ECR
        env: 
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag mp-frontend:latest $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker tag mp-frontend:latest $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

      - name: Deploy to EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd k8s
          kustomize edit set image frontend=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          kustomize build | kubectl apply -f -
