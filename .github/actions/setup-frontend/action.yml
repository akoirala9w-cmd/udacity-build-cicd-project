name: 'Setup Frontend Environment'
description: 'Checks out code, install Node 18, and runs npm ci to install dependencies'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: starter/frontend/package-lock.json

    - name: Install dependencies
      run: npm ci
      shell: bash
      working-directory: starter/frontend